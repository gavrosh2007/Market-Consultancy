<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет соединения</title>
    <style>
        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Inter', system-ui, sans-serif;
            background: #f5f7fc;
            text-align: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .offline-card {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border-left: 5px solid #e8491d;
        }
        h1 { color: #e8491d; margin-bottom: 1rem; }
        p { color: #2c3e50; line-height: 1.5; margin-bottom: 1.5rem; }
        button {
            background: #e8491d;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <h1>📡 Нет интернета</h1>
        <p>Пожалуйста, проверьте соединение и попробуйте снова.</p>
        <button onclick="location.reload()">🔄 Обновить</button>
    </div>
</body>
</html>
